name: Bug report
description: Report reproducible incorrect behavior
title: 'fix: '
labels: [bug]
body:
  - type: textarea
    id: steps
    attributes: { label: Reproduction steps }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: Expected behavior }
    validations: { required: true }
  - type: textarea
    id: actual
    attributes: { label: Actual behavior }
    validations: { required: true }
  - type: input
    id: environment
    attributes: { label: Browser, device and commit }
